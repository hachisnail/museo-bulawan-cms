    /* Sorting Controls */
    .controls {
      margin-bottom: 20px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
    }
    .controls select {
      padding: 8px 12px;
      font-family: inherit;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    a.card {
      text-decoration: none;
      color: inherit;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.2s ease-in-out;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: scale(1.02);
    }
    .card img {
      width: 100%;
      height: auto;
      display: block;
    }
    .card-content {
      padding: 15px;
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .card-subtitle {
      font-size: 0.9rem;
      color: #777;
      margin-bottom: 10px;
      min-height: 16px;
    }

    const container = document.getElementById('speaker-container');
    const sortSelect = document.getElementById('sort-speakers');

    // 2. Render Function
    function renderCards(data) {
      container.innerHTML = data.map(speaker => `
        <a href="${speaker.url}" class="card">
          <img src="${speaker.img}" alt="${speaker.name}">
          <div class="card-content">
            <div class="card-title">${speaker.title}</div>
            <div class="card-subtitle">${speaker.subtitle}</div>
          </div>
        </a>
      `).join('');
    }

    // 3. Helper Function: Extract Last Name
    function getLastName(fullName) {
      // Remove prefixes like "Dr. " to keep it clean
      const cleanName = fullName.replace(/^(Dr\.\s*)/i, '').trim();
      // Split by spaces and grab the last item
      const nameParts = cleanName.split(' ');
      return nameParts[nameParts.length - 1].toLowerCase();
    }

    // 4. Sort Function
    function sortAndRender() {
      const order = sortSelect.value;
      
      const sortedSpeakers = [...speakers].sort((a, b) => {
        const lastNameA = getLastName(a.name);
        const lastNameB = getLastName(b.name);

        if (order === 'asc') {
          return lastNameA.localeCompare(lastNameB);
        } else {
          return lastNameB.localeCompare(lastNameA);
        }
      });
      
      renderCards(sortedSpeakers);
    }

    // 5. Event Listener and Initial Load
    sortSelect.addEventListener('change', sortAndRender);
    
    // Sort on page load
    sortAndRender();
